name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - run: cargo clippy --all-targets -- -D warnings

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: Enable unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
          sudo sysctl -w kernel.unprivileged_userns_clone=1 2>/dev/null || true
      - name: Run tests with delegated cgroup
        run: |
          # Find the current cgroup (e.g., /system.slice/hosted-compute-agent.service)
          current_cg="/sys/fs/cgroup$(cat /proc/self/cgroup | grep '^0::' | cut -d: -f3)"
          parent_cg="$(dirname "$current_cg")"

          # Enable memory+pids controllers from root down to the parent.
          p="/sys/fs/cgroup"
          while [ "$p" != "$parent_cg" ] && [ "$p" != "/" ]; do
            [ -f "$p/cgroup.subtree_control" ] && \
              echo '+memory +pids' | sudo tee "$p/cgroup.subtree_control" 2>/dev/null || true
            next="$(echo "$parent_cg" | sed "s|^$p/||" | cut -d/ -f1)"
            p="$p/$next"
          done
          [ -f "$parent_cg/cgroup.subtree_control" ] && \
            echo '+memory +pids' | sudo tee "$parent_cg/cgroup.subtree_control" 2>/dev/null || true

          # Create lot-test under the same parent as our current cgroup.
          cg="$parent_cg/lot-test"
          sudo mkdir -p "$cg/runner"
          sudo chown -R "$(id -u):$(id -g)" "$cg"
          echo '+memory +pids' > "$cg/cgroup.subtree_control"

          # Move ourselves into the runner leaf.
          echo $$ | sudo tee "$cg/runner/cgroup.procs"
          cargo test -- --test-threads=1 --nocapture

  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - run: cargo test -- --test-threads=1

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: Exclude workspace from Windows Defender
        shell: powershell
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
      - name: Configure AppContainer prerequisites
        run: cargo run -p reel-cli -- setup --verbose
      - run: cargo test -- --test-threads=1 --nocapture

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - run: cargo build
